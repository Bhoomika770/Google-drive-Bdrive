<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDrive - Google Drive Clone</title>

```
<link rel="stylesheet" href="style.css">

<!-- Font Awesome (icons fix) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
```

</head>
<body>

```
<!-- Splash -->
<div class="splash-screen active" id="splash-screen">
    <div class="splash-content">
        <img src="Google_Drive.svg" width="80">
        <h1>BDrive</h1>
        <p>Powered by Bhoomika Patel</p>
    </div>
</div>

<!-- Login -->
<div class="login-page" id="login-page">
    <div class="login-container">
        <img src="Google_Drive.svg" width="70">
        <h1>Sign in to BDrive</h1>

        <div class="login-form">
            <input type="email" placeholder="Email" id="email">
            <input type="password" placeholder="Password" id="password">
            <button class="login-btn" id="login-btn">Sign In</button>

            <div class="create-account">
                <p>Don't have an account? <a href="#">Create account</a></p>
            </div>
        </div>
    </div>
</div>

<!-- Drive -->
<div class="drive-page" id="drive-page">
    <header>
        <div class="header-left">
            <img src="Google_Drive.svg" width="30">
            <h1>BDrive</h1>
        </div>

        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search in Drive">
        </div>

        <div class="header-right">
            <i class="fas fa-cog"></i>
            <img src="https://via.placeholder.com/40" width="30">
        </div>
    </header>

    <div class="main-content">

        <!-- Sidebar -->
        <div class="sidebar">
            <button class="new-btn" id="upload-btn">
                <i class="fas fa-plus"></i> New
            </button>

            <ul class="nav-links">
                <li class="active"><i class="fas fa-home"></i> My Drive</li>
                <li><i class="fas fa-users"></i> Shared with me</li>
                <li><i class="far fa-clock"></i> Recent</li>
                <li><i class="far fa-star"></i> Starred</li>
                <li><i class="far fa-trash-alt"></i> Trash</li>
            </ul>
        </div>

        <!-- Content -->
        <div class="content">
            <h2>My Drive</h2>

            <div class="file-upload-area" id="file-upload-area">
                <div class="upload-box">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <h3>Upload files</h3>
                    <p>Drag & drop files here</p>
                </div>
            </div>

            <div class="files-container" id="files-container"></div>
        </div>

    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast-message">
    <p id="toast-text"></p>
</div>

<script src="script.js"></script>
<script src="index.js"></script>
```

</body>
</html>
